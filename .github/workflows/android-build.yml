name: Build Pocket API Inspector APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        working-directory: android
        run: ./gradlew test

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-api-inspector-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Detect whether signing secrets have been configured in this repo
      - name: Check for signing secrets
        id: check_secrets
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK (if signing secrets present)
        if: steps.check_secrets.outputs.has_secrets == 'true'
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Upload release APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pocket-api-inspector-release
          path: android/app/build/outputs/apk/release/app-release.apk
